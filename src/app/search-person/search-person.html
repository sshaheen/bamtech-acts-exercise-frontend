<div class="search-container">
  <section class="search-form">
    <form (ngSubmit)="getPerson()">
      <p>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" [(ngModel)]="inputName" />
      </p>
      <p>
        <button type="submit">Find</button>
      </p>
    </form>
  </section>
  <section class="person-info">
    @if (!showError() && person(); as p) {
      <app-display-person [person]="p" />
    } @else if (showError()) {
      <article>
        <header>ERROR!</header>
        <p>{{ errorMessage() }}</p>
      </article>
    }
  </section>
</div>
