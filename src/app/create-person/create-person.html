<div class="create-person-container">
  <section class="create-form">
    <form (ngSubmit)="createPerson()">
      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" [(ngModel)]="inputName" />
      </div>
      <div class="sub-button">
        <button type="submit">Create</button>
      </div>
    </form>
  </section>
  @if (success()) {
    <section>
      <article>
        <header>
          <h2>Success!</h2>
        </header>
        <p>You have created a new person named {{ createdPersonName }}!</p>
      </article>
    </section>
  }
</div>
